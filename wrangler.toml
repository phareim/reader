name = "reader-service"
main = ".output/server/index.mjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[site]
bucket = ".output/public"

[[d1_databases]]
binding = "DB"
database_name = "reader-service"
database_id = "2ccea3e6-cd78-45f5-9395-1094f964b273"

[[routes]]
pattern = "reader.phareim.no"
zone_name = "phareim.no"
custom_domain = true

[[r2_buckets]]
binding = "ARTICLE_BUCKET"
bucket_name = "reader-articles"

[vars]
NUXT_SFL_API_URL = "https://sfl-api.aiwdm.workers.dev"
NUXT_TTS_API_URL = "https://sleeper.phareim.no/reader-tts"
# Accounts with the personal integrations (SFL elevate, highlight→SFL
# mirror, read-aloud). Everyone else gets the core reading experience.
NUXT_PERSONAL_EMAILS = "phareim@gmail.com,petter.hareim@miles.no"

# Secrets (wrangler secret put): NUXT_SFL_API_KEY, NUXT_TTS_API_KEY,
# NUXT_INVITE_CODE (sign-up is closed while unset),
# NUXT_CRON_KEY (auth for POST /api/internal/sync-stale).

