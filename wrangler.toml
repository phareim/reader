name = "reader-service"
main = ".output/server/index.mjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[site]
bucket = ".output/public"

[[d1_databases]]
binding = "DB"
database_name = "reader-service"
database_id = "2ccea3e6-cd78-45f5-9395-1094f964b273"
migrations_dir = "database/migrations"

[[routes]]
pattern = "reader.phareim.no"
zone_name = "phareim.no"
custom_domain = true

[[r2_buckets]]
binding = "ARTICLE_BUCKET"
bucket_name = "reader-articles"

[vars]
NUXT_SFL_API_URL = "https://sfl-api.aiwdm.workers.dev"
NUXT_TASTE_API_URL = "https://taste.phareim.no"
NUXT_TTS_API_URL = "https://sleeper.phareim.no/reader-tts"
# Accounts with the personal integrations (SFL elevate, highlight→SFL
# mirror). Everyone else gets the core reading experience — including
# read-aloud, which is deliberately open to all signed-in users.
NUXT_PERSONAL_EMAILS = "phareim@gmail.com"
# OAuth2 app client ids for the linked-sources flows on /sources (client
# ids are public by design; the matching secrets are Worker secrets below).
# A missing id+secret pair just hides that source's row in the UI.
NUXT_X_CLIENT_ID = "VUxRd2UyR19DZmdiNWdlbUxoYks6MTpjaQ"
# NUXT_REDDIT_CLIENT_ID = "..."  # set once the Reddit app exists (type "web app",
#                                # redirect https://reader.phareim.no/api/auth/reddit/callback)

# Secrets (wrangler secret put): NUXT_SFL_API_KEY, NUXT_TTS_API_KEY,
# NUXT_TASTE_INGEST_KEY (= taste-maker's TASTE_INGEST_KEY; highlight→quote mirror),
# NUXT_INVITE_CODE (sign-up is closed while unset),
# NUXT_CRON_KEY (auth for POST /api/internal/sync-{stale,sources}),
# NUXT_X_CLIENT_SECRET (X OAuth2 app client secret),
# NUXT_REDDIT_CLIENT_SECRET (Reddit OAuth2 app client secret).

