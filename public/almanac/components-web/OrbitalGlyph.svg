<?xml version="1.0" encoding="UTF-8"?>
<!--
  OrbitalGlyph — the Almanac mark.
  Inner circle 38u + off-axis ellipse + 2u accent dot, centered at (28, 20).
  The orbital ellipse intentionally extends past the inner circle (~9u beyond
  the 38u circle on the long axis after the -25° rotation), so the viewBox is
  56 × 40 to contain the full glyph.

  Reserve 38u of layout space if you want the iOS-faithful "bleed past the
  reserved bounds" effect; reserve 56 × 40 if you want no clipping.

  Stroke uses currentColor → ink. Accent dot uses var(--almanac-accent).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 40" width="56" height="40" role="img" aria-label="Almanac mark" fill="none">
  <!-- inner circle, 38u diameter -->
  <circle cx="28" cy="20" r="18.5" stroke="currentColor" stroke-width="1"/>
  <!-- orbit ellipse, rotated -25° -->
  <g transform="rotate(-25 28 20)">
    <ellipse cx="28" cy="20" rx="26.98" ry="6.84" stroke="currentColor" stroke-width="1" opacity="0.55"/>
  </g>
  <!-- accent dot, 4u diameter -->
  <circle cx="28" cy="20" r="2" fill="var(--almanac-accent, currentColor)"/>
</svg>
